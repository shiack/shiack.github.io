<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0c0a1e"/>
      <stop offset="100%" stop-color="#060410"/>
    </linearGradient>
    <linearGradient id="pavement" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#100c24"/>
      <stop offset="100%" stop-color="#080614"/>
    </linearGradient>
    <!-- Wet asphalt reflections -->
    <linearGradient id="reflMagenta" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ff0088" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ff0088" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="reflCyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00ffcc" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="reflYellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffcc00" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffcc00" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="poleGlow">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- ===== ROAD SURFACE ===== -->
  <!-- Main road -->
  <rect x="0"    y="410" width="1600" height="90"  fill="url(#road)"/>
  <!-- Pavement / sidewalks -->
  <rect x="0"    y="390" width="1600" height="22"  fill="url(#pavement)"/>
  <rect x="0"    y="494" width="1600" height="6"   fill="#04030c" opacity="0.90"/>
  <!-- Kerb edge highlights -->
  <rect x="0"    y="410" width="1600" height="2"   fill="#1e1840" opacity="0.70"/>
  <rect x="0"    y="490" width="1600" height="2"   fill="#141028" opacity="0.60"/>

  <!-- ===== WET REFLECTIONS ON ROAD ===== -->
  <!-- Magenta neon reflection pool -->
  <ellipse cx="320"  cy="460" rx="180" ry="18" fill="url(#reflMagenta)" opacity="0.90"/>
  <ellipse cx="320"  cy="455" rx="120" ry="8"  fill="#ff0088" opacity="0.06"/>
  <!-- Cyan reflection pool -->
  <ellipse cx="900"  cy="465" rx="220" ry="20" fill="url(#reflCyan)"    opacity="0.85"/>
  <ellipse cx="900"  cy="460" rx="140" ry="10" fill="#00ffcc" opacity="0.05"/>
  <!-- Yellow/warm reflection (headlight) -->
  <ellipse cx="1380" cy="458" rx="160" ry="15" fill="url(#reflYellow)"  opacity="0.80"/>
  <!-- Smaller scattered puddles -->
  <ellipse cx="570"  cy="448" rx="60"  ry="5"  fill="#cc00ff" opacity="0.08"/>
  <ellipse cx="1100" cy="445" rx="70"  ry="5"  fill="#ff6600" opacity="0.06"/>
  <ellipse cx="200"  cy="455" rx="45"  ry="4"  fill="#00ccff" opacity="0.06"/>
  <!-- Road centre markings (dashed line) -->
  <g fill="#1e1840" opacity="0.55">
    <rect x="0"    y="449" width="80"  height="2"/>
    <rect x="120"  y="449" width="80"  height="2"/>
    <rect x="240"  y="449" width="80"  height="2"/>
    <rect x="360"  y="449" width="80"  height="2"/>
    <rect x="480"  y="449" width="80"  height="2"/>
    <rect x="600"  y="449" width="80"  height="2"/>
    <rect x="720"  y="449" width="80"  height="2"/>
    <rect x="840"  y="449" width="80"  height="2"/>
    <rect x="960"  y="449" width="80"  height="2"/>
    <rect x="1080" y="449" width="80"  height="2"/>
    <rect x="1200" y="449" width="80"  height="2"/>
    <rect x="1320" y="449" width="80"  height="2"/>
    <rect x="1440" y="449" width="80"  height="2"/>
  </g>

  <!-- ===== LAMP POSTS ===== -->
  <!-- Lamp post 1 – left -->
  <rect x="118"  y="260" width="4"   height="132" fill="#141030" opacity="0.95"/>
  <!-- arm -->
  <rect x="96"   y="260" width="22"  height="3"   fill="#141030" opacity="0.90"/>
  <rect x="88"   y="256" width="12"  height="12"  fill="#0c0a22" opacity="0.90" rx="2"/>
  <!-- lamp bloom -->
  <ellipse cx="94"  cy="258" rx="16"  ry="8"   fill="#ffcc00" opacity="0" filter="url(#poleGlow)">
    <animate attributeName="opacity" values="0.18;0.28;0.18" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="94"  cy="262" rx="8"   ry="4"   fill="#ffdd44" opacity="0.65"/>
  <!-- Reflection on pavement -->
  <ellipse cx="120" cy="394" rx="20"  ry="4"   fill="#ffcc00" opacity="0.06"/>

  <!-- Lamp post 2 – left-centre -->
  <rect x="418"  y="255" width="4"   height="137" fill="#141030" opacity="0.95"/>
  <rect x="396"  y="255" width="22"  height="3"   fill="#141030" opacity="0.90"/>
  <rect x="388"  y="251" width="12"  height="12"  fill="#0c0a22" opacity="0.90" rx="2"/>
  <ellipse cx="394" cy="253" rx="16"  ry="8"   fill="#ffcc00" opacity="0" filter="url(#poleGlow)">
    <animate attributeName="opacity" values="0.16;0.26;0.16" dur="3.4s" begin="0.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="394" cy="257" rx="8"   ry="4"   fill="#ffdd44" opacity="0.62"/>
  <ellipse cx="420" cy="394" rx="20"  ry="4"   fill="#ffcc00" opacity="0.06"/>

  <!-- Lamp post 3 – centre left (neon blue variant) -->
  <rect x="718"  y="248" width="4"   height="144" fill="#141030" opacity="0.95"/>
  <rect x="696"  y="248" width="22"  height="3"   fill="#141030" opacity="0.90"/>
  <rect x="688"  y="244" width="12"  height="12"  fill="#0a0820" opacity="0.90" rx="2"/>
  <ellipse cx="694" cy="246" rx="16"  ry="8"   fill="#00ccff" opacity="0" filter="url(#poleGlow)">
    <animate attributeName="opacity" values="0.20;0.32;0.20" dur="2.8s" begin="1.2s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="694" cy="250" rx="8"   ry="4"   fill="#44ddff" opacity="0.65"/>
  <ellipse cx="720" cy="394" rx="22"  ry="4"   fill="#00ccff" opacity="0.06"/>

  <!-- Lamp post 4 – centre right -->
  <rect x="1018" y="252" width="4"   height="140" fill="#141030" opacity="0.95"/>
  <rect x="996"  y="252" width="22"  height="3"   fill="#141030" opacity="0.90"/>
  <rect x="988"  y="248" width="12"  height="12"  fill="#0c0a22" opacity="0.90" rx="2"/>
  <ellipse cx="994" cy="250" rx="16"  ry="8"   fill="#ffcc00" opacity="0" filter="url(#poleGlow)">
    <animate attributeName="opacity" values="0.16;0.28;0.16" dur="3.1s" begin="0.3s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="994" cy="254" rx="8"   ry="4"   fill="#ffdd44" opacity="0.60"/>
  <ellipse cx="1020" cy="394" rx="20" ry="4"   fill="#ffcc00" opacity="0.06"/>

  <!-- Lamp post 5 – right (magenta variant) -->
  <rect x="1318" y="256" width="4"   height="136" fill="#141030" opacity="0.95"/>
  <rect x="1296" y="256" width="22"  height="3"   fill="#141030" opacity="0.90"/>
  <rect x="1288" y="252" width="12"  height="12"  fill="#0a0820" opacity="0.90" rx="2"/>
  <ellipse cx="1294" cy="254" rx="16" ry="8"   fill="#ff0088" opacity="0" filter="url(#poleGlow)">
    <animate attributeName="opacity" values="0.18;0.30;0.18" dur="2.6s" begin="1.8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="1294" cy="258" rx="8"  ry="4"   fill="#ff44aa" opacity="0.62"/>
  <ellipse cx="1320" cy="394" rx="22" ry="4"   fill="#ff0088" opacity="0.06"/>

  <!-- Lamp post 6 – far right -->
  <rect x="1538" y="260" width="4"   height="132" fill="#141030" opacity="0.95"/>
  <rect x="1516" y="260" width="22"  height="3"   fill="#141030" opacity="0.90"/>
  <rect x="1508" y="256" width="12"  height="12"  fill="#0c0a22" opacity="0.90" rx="2"/>
  <ellipse cx="1514" cy="258" rx="16" ry="8"   fill="#ffcc00" opacity="0" filter="url(#poleGlow)">
    <animate attributeName="opacity" values="0.16;0.26;0.16" dur="3.6s" begin="0.9s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="1514" cy="262" rx="8"  ry="4"   fill="#ffdd44" opacity="0.58"/>
  <ellipse cx="1540" cy="394" rx="20" ry="4"   fill="#ffcc00" opacity="0.06"/>

  <!-- ===== STREET-LEVEL DETAIL ===== -->
  <!-- Manhole cover centre -->
  <circle cx="800" cy="460" r="22"  fill="#0c0a1e" opacity="0.80"/>
  <circle cx="800" cy="460" r="22"  fill="none" stroke="#1e1840" stroke-width="2"/>
  <circle cx="800" cy="460" r="14"  fill="none" stroke="#181438" stroke-width="1.5"/>
  <line x1="778" y1="460" x2="822" y2="460" stroke="#181438" stroke-width="1.5"/>
  <line x1="800" y1="438" x2="800" y2="482" stroke="#181438" stroke-width="1.5"/>
  <!-- Steam from manhole -->
  <ellipse cx="800" cy="436" rx="10" ry="4"  fill="#aaaacc" opacity="0">
    <animate attributeName="opacity" values="0;0.12;0.08;0;0" dur="4s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,-20" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Garbage / debris pile left -->
  <rect x="160"  y="382" width="18"  height="10"  fill="#100e28" opacity="0.75" rx="1"/>
  <rect x="180"  y="384" width="12"  height="8"   fill="#0c0c24" opacity="0.70" rx="1"/>
  <rect x="170"  y="380" width="8"   height="4"   fill="#141230" opacity="0.65" rx="1"/>
  <!-- Debris right -->
  <rect x="1420" y="384" width="20"  height="9"   fill="#100e28" opacity="0.72" rx="1"/>
  <rect x="1440" y="382" width="14"  height="10"  fill="#0c0c24" opacity="0.68" rx="1"/>

  <!-- Neon puddle reflections horizontal smears -->
  <rect x="0"    y="480" width="1600" height="8"   fill="#0a0818" opacity="0.65"/>
  <!-- Faint neon horizon line at pavement edge -->
  <rect x="0"    y="390" width="1600" height="1"   fill="#00ffcc" opacity="0.12"/>
</svg>
