<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#000005"/>
      <stop offset="28%"  stop-color="#03030e"/>
      <stop offset="56%"  stop-color="#07071a"/>
      <stop offset="78%"  stop-color="#0e0820"/>
      <stop offset="100%" stop-color="#180a2a"/>
    </linearGradient>
    <!-- City light pollution glow at horizon -->
    <radialGradient id="cityGlow" cx="50%" cy="105%" r="65%">
      <stop offset="0%"   stop-color="#6600cc" stop-opacity="0.22"/>
      <stop offset="25%"  stop-color="#cc0066" stop-opacity="0.12"/>
      <stop offset="55%"  stop-color="#ff6600" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <!-- Purple nebula cloud, left -->
    <radialGradient id="neb1" cx="20%" cy="28%" r="32%">
      <stop offset="0%"   stop-color="#200840" stop-opacity="0.75"/>
      <stop offset="55%"  stop-color="#120420" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <!-- Deep blue nebula, right -->
    <radialGradient id="neb2" cx="76%" cy="20%" r="29%">
      <stop offset="0%"   stop-color="#041830" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <!-- Cyan dust, centre -->
    <radialGradient id="neb3" cx="50%" cy="52%" r="24%">
      <stop offset="0%"   stop-color="#031820" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <!-- Small magenta wisp, upper right -->
    <radialGradient id="neb4" cx="88%" cy="38%" r="16%">
      <stop offset="0%"   stop-color="#2a0020" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="500" fill="url(#sky)"/>
  <rect width="1600" height="500" fill="url(#cityGlow)"/>
  <rect width="1600" height="500" fill="url(#neb1)"/>
  <rect width="1600" height="500" fill="url(#neb2)"/>
  <rect width="1600" height="500" fill="url(#neb3)"/>
  <rect width="1600" height="500" fill="url(#neb4)"/>

  <!-- Bright hero stars -->
  <g fill="#ffffff">
    <circle cx="45"   cy="32"  r="1.8" opacity="0.95"/>
    <circle cx="290"  cy="18"  r="1.6" opacity="0.90"/>
    <circle cx="540"  cy="42"  r="1.4" opacity="0.85"/>
