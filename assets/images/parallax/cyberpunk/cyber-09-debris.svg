<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="heavyGlow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- ===== FOREGROUND SILHOUETTE STRUCTURES ===== -->
  <!-- Left pillar / column base (partial, cut off) -->
  <rect x="-12"  y="220" width="38"  height="280" fill="#08060e" opacity="0.97"/>
  <rect x="-12"  y="216" width="38"  height="4"   fill="#00ffcc" opacity="0.65" filter="url(#glow)"/>
  <!-- Rivet detail on pillar -->
  <circle cx="6"  cy="228" r="3" fill="#101030" opacity="0.80"/>
  <circle cx="6"  cy="242" r="3" fill="#101030" opacity="0.80"/>
  <circle cx="6"  cy="256" r="3" fill="#101030" opacity="0.80"/>
  <circle cx="6"  cy="270" r="3" fill="#101030" opacity="0.80"/>
  <circle cx="18" cy="235" r="3" fill="#101030" opacity="0.80"/>
  <circle cx="18" cy="249" r="3" fill="#101030" opacity="0.80"/>
  <circle cx="18" cy="263" r="3" fill="#101030" opacity="0.80"/>

  <!-- Right pillar -->
  <rect x="1574" y="210" width="40"  height="290" fill="#08060e" opacity="0.97"/>
  <rect x="1574" y="206" width="40"  height="4"   fill="#ff0088" opacity="0.65" filter="url(#glow)"/>
  <circle cx="1582" cy="220" r="3" fill="#101030" opacity="0.80"/>
  <circle cx="1582" cy="234" r="3" fill="#101030" opacity="0.80"/>
  <circle cx="1582" cy="248" r="3" fill="#101030" opacity="0.80"/>
  <circle cx="1594" cy="227" r="3" fill="#101030" opacity="0.80"/>
  <circle cx="1594" cy="241" r="3" fill="#101030" opacity="0.80"/>

  <!-- ===== FOREGROUND NEON FRAMES / ARCH ===== -->
  <!-- Left corner arch -->
  <rect x="26"   y="170" width="6"   height="330" fill="#0a0818" opacity="0.92"/>
  <rect x="26"   y="166" width="180" height="6"   fill="#0a0818" opacity="0.92"/>
  <!-- Neon tube on arch - cyan -->
  <rect x="26"   y="166" width="180" height="3"   fill="#00ffcc" opacity="0.80" filter="url(#glow)"/>
  <rect x="26"   y="169" width="3"   height="200" fill="#00ffcc" opacity="0.70" filter="url(#glow)"/>

  <!-- Right corner arch -->
  <rect x="1568" y="178" width="6"   height="322" fill="#0a0818" opacity="0.92"/>
  <rect x="1394" y="178" width="180" height="6"   fill="#0a0818" opacity="0.92"/>
  <!-- Neon tube on arch - magenta -->
  <rect x="1394" y="178" width="180" height="3"   fill="#ff0088" opacity="0.80" filter="url(#glow)"/>
  <rect x="1571" y="181" width="3"   height="200" fill="#ff0088" opacity="0.70" filter="url(#glow)"/>

  <!-- ===== CLOSE SIGNAGE ===== -->
  <!-- Large vertical neon sign, left side – katakana style decoration -->
  <rect x="48"   y="188" width="32"  height="168" fill="#060412" opacity="0.95" rx="2"/>
  <rect x="48"   y="188" width="32"  height="2"   fill="#00ffcc" opacity="0.90" filter="url(#glow)"/>
  <rect x="48"   y="354" width="32"  height="2"   fill="#00ffcc" opacity="0.90" filter="url(#glow)"/>
  <rect x="48"   y="190" width="2"   height="164" fill="#00ffcc" opacity="0.80" filter="url(#glow)"/>
  <rect x="78"   y="190" width="2"   height="164" fill="#00ffcc" opacity="0.80" filter="url(#glow)"/>
  <!-- Characters -->
  <text x="56"  y="220" font-family="monospace" font-size="14" fill="#00ffcc" opacity="0.85" transform="rotate(90,56,220)">SECTOR</text>
  <text x="58"  y="306" font-family="monospace" font-size="12" fill="#00ccaa" opacity="0.72">7</text>
  <text x="58"  y="325" font-family="monospace" font-size="12" fill="#00ccaa" opacity="0.72">G</text>
  <text x="58"  y="344" font-family="monospace" font-size="12" fill="#00ccaa" opacity="0.72">X</text>
  <!-- Blink accent -->
  <circle cx="64" cy="200" r="4" fill="#00ffcc" opacity="0.90">
    <animate attributeName="opacity" values="0.90;0.10;0.90;0.90;0.10" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Vertical sign right side -->
  <rect x="1520" y="196" width="32"  height="152" fill="#060412" opacity="0.95" rx="2"/>
  <rect x="1520" y="196" width="32"  height="2"   fill="#ff0088" opacity="0.90" filter="url(#glow)"/>
  <rect x="1520" y="346" width="32"  height="2"   fill="#ff0088" opacity="0.90" filter="url(#glow)"/>
  <rect x="1520" y="198" width="2"   height="148" fill="#ff0088" opacity="0.80" filter="url(#glow)"/>
  <rect x="1550" y="198" width="2"   height="148" fill="#ff0088" opacity="0.80" filter="url(#glow)"/>
  <text x="1528" y="228" font-family="monospace" font-size="13" fill="#ff0088" opacity="0.85">V</text>
  <text x="1528" y="248" font-family="monospace" font-size="13" fill="#ff0088" opacity="0.85">O</text>
  <text x="1528" y="268" font-family="monospace" font-size="13" fill="#ff0088" opacity="0.85">I</text>
  <text x="1528" y="288" font-family="monospace" font-size="13" fill="#ff0088" opacity="0.85">D</text>
  <circle cx="1536" cy="338" r="4" fill="#ff0088" opacity="0.90">
    <animate attributeName="opacity" values="0.90;0.10;0.90;0.90;0.10" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
  </circle>

  <!-- ===== CLOSE-UP RAILING / LEDGE ===== -->
  <rect x="0"    y="368" width="1600" height="8"   fill="#0a0818" opacity="0.85"/>
  <rect x="0"    y="366" width="1600" height="2"   fill="#181440" opacity="0.75"/>
  <!-- Railing posts -->
  <g fill="#0e0c22" opacity="0.85">
    <rect x="60"   y="322" width="4" height="46"/>
    <rect x="120"  y="320" width="4" height="48"/>
    <rect x="180"  y="322" width="4" height="46"/>
    <rect x="240"  y="319" width="4" height="49"/>
    <rect x="300"  y="322" width="4" height="46"/>
    <rect x="360"  y="320" width="4" height="48"/>
    <rect x="420"  y="322" width="4" height="46"/>
    <rect x="480"  y="318" width="4" height="50"/>
    <rect x="540"  y="322" width="4" height="46"/>
    <rect x="600"  y="320" width="4" height="48"/>
    <rect x="660"  y="322" width="4" height="46"/>
    <rect x="720"  y="319" width="4" height="49"/>
    <rect x="780"  y="322" width="4" height="46"/>
    <rect x="840"  y="320" width="4" height="48"/>
    <rect x="900"  y="322" width="4" height="46"/>
    <rect x="960"  y="318" width="4" height="50"/>
    <rect x="1020" y="322" width="4" height="46"/>
    <rect x="1080" y="320" width="4" height="48"/>
    <rect x="1140" y="322" width="4" height="46"/>
    <rect x="1200" y="319" width="4" height="49"/>
    <rect x="1260" y="322" width="4" height="46"/>
    <rect x="1320" y="320" width="4" height="48"/>
    <rect x="1380" y="322" width="4" height="46"/>
    <rect x="1440" y="318" width="4" height="50"/>
    <rect x="1500" y="322" width="4" height="46"/>
    <rect x="1556" y="320" width="4" height="48"/>
  </g>
  <!-- Railing horizontal bar -->
  <rect x="0"    y="320" width="1600" height="4"   fill="#0e0c22" opacity="0.80"/>
  <!-- Neon accent on railing top -->
  <rect x="0"    y="320" width="1600" height="1"   fill="#00ccff" opacity="0.18"/>

  <!-- ===== WIRES AND CABLES IN FOREGROUND ===== -->
  <!-- Taut cable left foreground -->
  <path d="M 28 232 Q 280 268 500 248" fill="none" stroke="#080616" stroke-width="2.5" opacity="0.85"/>
  <path d="M 28 240 Q 260 278 498 258" fill="none" stroke="#080616" stroke-width="2" opacity="0.75"/>
  <!-- Taut cable right -->
  <path d="M 1572 228 Q 1320 262 1100 244" fill="none" stroke="#080616" stroke-width="2.5" opacity="0.85"/>
  <path d="M 1572 238 Q 1340 274 1102 255" fill="none" stroke="#080616" stroke-width="2" opacity="0.75"/>
  <!-- Centre sagging cables -->
  <path d="M 500 248 Q 800 292 1100 244" fill="none" stroke="#060412" stroke-width="2.5" opacity="0.80"/>
  <path d="M 498 258 Q 800 306 1102 255" fill="none" stroke="#060412" stroke-width="2" opacity="0.70"/>

  <!-- ===== CLOSE-UP NEON AMBIENT LIGHT BLEEDS ===== -->
  <!-- Cyan bloom lower left -->
  <ellipse cx="80"   cy="380" rx="80"  ry="30"  fill="#00ffcc" opacity="0" filter="url(#heavyGlow)">
    <animate attributeName="opacity" values="0.08;0.14;0.08" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Magenta bloom lower right -->
  <ellipse cx="1520" cy="370" rx="80"  ry="28"  fill="#ff0088" opacity="0" filter="url(#heavyGlow)">
    <animate attributeName="opacity" values="0.07;0.13;0.07" dur="3.6s" begin="0.8s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Subtle wide scan light from top of frame -->
  <rect x="600"  y="0"   width="400" height="320" fill="#0044aa" opacity="0">
    <animate attributeName="opacity" values="0;0.025;0.05;0.025;0" dur="8s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="-300,0" to="300,0" dur="8s" repeatCount="indefinite"/>
  </rect>
</svg>
