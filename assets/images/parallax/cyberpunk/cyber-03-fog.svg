<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="fog1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a0835" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#2a0a50" stop-opacity="0.28"/>
      <stop offset="62%"  stop-color="#1a0638" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#0e0425" stop-opacity="0.72"/>
    </linearGradient>
    <radialGradient id="fogBloom1" cx="22%" cy="90%" r="38%">
      <stop offset="0%"   stop-color="#cc0066" stop-opacity="0.16"/>
      <stop offset="55%"  stop-color="#880044" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="fogBloom2" cx="78%" cy="88%" r="32%">
      <stop offset="0%"   stop-color="#00ccff" stop-opacity="0.14"/>
      <stop offset="50%"  stop-color="#0088bb" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="fogBloom3" cx="50%" cy="95%" r="45%">
      <stop offset="0%"   stop-color="#6600cc" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Soft cloud filter -->
    <filter id="cloudBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="cloudBlurMid" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Base atmospheric gradient -->
  <rect width="1600" height="500" fill="url(#fog1)"/>

  <!-- Neon bloom from city lights below -->
  <rect width="1600" height="500" fill="url(#fogBloom1)"/>
  <rect width="1600" height="500" fill="url(#fogBloom2)"/>
  <rect width="1600" height="500" fill="url(#fogBloom3)"/>

  <!-- Cloud mass 1 – upper left, purple-dark -->
  <g filter="url(#cloudBlur)">
    <ellipse cx="160"  cy="160" rx="280" ry="90"  fill="#18083a" opacity="0.80"/>
    <ellipse cx="80"   cy="200" rx="180" ry="60"  fill="#1e0845" opacity="0.65"/>
    <ellipse cx="320"  cy="140" rx="200" ry="55"  fill="#160638" opacity="0.55"/>
  </g>

  <!-- Cloud mass 2 – upper centre, deep indigo -->
  <g filter="url(#cloudBlur)">
    <ellipse cx="800"  cy="120" rx="320" ry="75"  fill="#0e0530" opacity="0.70"/>
    <ellipse cx="700"  cy="155" rx="250" ry="65"  fill="#120640" opacity="0.55"/>
    <ellipse cx="920"  cy="145" rx="200" ry="55"  fill="#0c0428" opacity="0.60"/>
  </g>

  <!-- Cloud mass 3 – upper right, blue-violet -->
  <g filter="url(#cloudBlur)">
    <ellipse cx="1440" cy="145" rx="260" ry="80"  fill="#0a0438" opacity="0.75"/>
    <ellipse cx="1550" cy="175" rx="200" ry="55"  fill="#14063a" opacity="0.60"/>
  </g>

  <!-- Mid-altitude haze band – faint, wide -->
  <g filter="url(#cloudBlurMid)">
    <ellipse cx="500"  cy="280" rx="400" ry="50"  fill="#1e0840" opacity="0.30"/>
    <ellipse cx="1200" cy="295" rx="380" ry="45"  fill="#180630" opacity="0.28"/>
  </g>

  <!-- Neon-lit cloud edge – magenta rim, left cloud -->
  <g filter="url(#cloudBlurMid)" opacity="0.35">
    <ellipse cx="130"  cy="230" rx="200" ry="20"  fill="#cc0066"/>
  </g>

  <!-- Neon-lit cloud edge – cyan rim, right -->
  <g filter="url(#cloudBlurMid)" opacity="0.28">
    <ellipse cx="1470" cy="218" rx="180" ry="18"  fill="#00ccff"/>
  </g>

  <!-- Dense smog layer near horizon -->
  <g filter="url(#cloudBlur)">
    <ellipse cx="400"  cy="420" rx="500" ry="120" fill="#10062a" opacity="0.60"/>
    <ellipse cx="1100" cy="415" rx="600" ry="110" fill="#0c0425" opacity="0.55"/>
    <ellipse cx="800"  cy="440" rx="800" ry="100" fill="#080318" opacity="0.50"/>
  </g>
</svg>
