  <!-- Antenna/spire on tallest -->
  <rect x="206"  y="268" width="3"   height="18"  fill="#1a0c2e" opacity="0.80"/>
  <rect x="99"   y="280" width="2"   height="16"  fill="#1a0c2e" opacity="0.78"/>

  <!-- Left-centre cluster – taller, more varied -->
  <rect x="240"  y="295" width="44"  height="205" fill="#0e0920" opacity="0.88"/>
  <rect x="278"  y="272" width="28"  height="228" fill="#120a24" opacity="0.87"/>
  <rect x="300"  y="310" width="36"  height="190" fill="#0a0618" opacity="0.90"/>
