<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Faint city glow on horizon -->
    <linearGradient id="horizonGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="68%"  stop-color="#180830"  stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#0c0420"  stop-opacity="0.85"/>
    </linearGradient>
    <!-- Warm orange bloom – industrial district -->
    <radialGradient id="warmBloom" cx="30%" cy="100%" r="30%">
      <stop offset="0%"   stop-color="#ff6600" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Cold cyan bloom – tech district -->
    <radialGradient id="cyanBloom" cx="70%" cy="100%" r="28%">
      <stop offset="0%"   stop-color="#00ccff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
  </defs>

  <!-- Atmosphere base -->
  <rect width="1600" height="500" fill="url(#horizonGlow)"/>
  <rect width="1600" height="500" fill="url(#warmBloom)"/>
  <rect width="1600" height="500" fill="url(#cyanBloom)"/>

  <!-- === FAR HORIZON SKYLINE (detailed silhouettes) === -->

  <!-- Left cluster – low dense blocks -->
  <rect x="0"    y="340" width="38"  height="160" fill="#0a0614" opacity="0.90"/>
  <rect x="30"   y="325" width="22"  height="175" fill="#0c0718" opacity="0.88"/>
  <rect x="45"   y="355" width="30"  height="145" fill="#08050f" opacity="0.90"/>
  <rect x="68"   y="316" width="16"  height="184" fill="#0d0818" opacity="0.85"/>
  <rect x="78"   y="338" width="28"  height="162" fill="#0a0614" opacity="0.88"/>
  <rect x="98"   y="296" width="20"  height="204" fill="#0e091c" opacity="0.87"/>
  <rect x="112"  y="318" width="34"  height="182" fill="#08050f" opacity="0.90"/>
  <rect x="140"  y="345" width="26"  height="155" fill="#0c0718" opacity="0.85"/>
  <rect x="160"  y="310" width="18"  height="190" fill="#0a0614" opacity="0.88"/>
  <rect x="172"  y="332" width="30"  height="168" fill="#0d0818" opacity="0.87"/>
