    <!-- warm yellow windows -->
    <rect x="254" y="305" width="2" height="2" fill="#ffcc00"/>
    <rect x="262" y="318" width="2" height="2" fill="#ffcc00"/>
    <rect x="298" y="284" width="2" height="2" fill="#ffcc00"/>
