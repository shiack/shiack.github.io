<!-- 音乐播放器组件 -->
<div class="music-player" id="musicPlayer">
    <div class="music-drag-handle" id="musicDragHandle">☰</div>
    <button class="music-btn" id="musicPrev" title="上一首">⟵</button>
    <button class="music-btn" id="musicToggle" title="播放/暂停">♪</button>
    <button class="music-btn" id="musicNext" title="下一首">⟶</button>
    <div class="music-info">
        <div class="music-title" id="musicTitle">Cyber Dreams</div>
        <div class="music-artist" id="musicArtist">Synthwave</div>
    </div>
    <div class="music-progress-container">
        <div class="music-progress" id="musicProgress">
            <div class="music-progress-bar" id="musicProgressBar"></div>
            <div class="music-progress-thumb" id="musicProgressThumb"></div>
        </div>
        <div class="music-time" id="musicTime">00:00 / 00:00</div>
    </div>
</div>
