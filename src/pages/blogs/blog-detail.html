<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Blog - Markdown Viewer</title>
    <link rel="stylesheet" href="/src/assets/styles/cyber.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.2.0/marked.min.js"></script>
    <script src="/src/js/modules/blog-data.js"></script>
    <script src="/src/js/modules/music-config.js"></script>
    <link rel="stylesheet" href="/src/components/music-player/music-player.css">
</head>
<body class="theme-cyber">
<!-- 主题切换按钮 -->
<div class="theme-toggle">
        <button class="theme-btn workspace" id="themeWorkspace" title="简约工作风">💻</button>
        <button class="theme-btn cyber active" id="themeCyber" title="赛博朋克">💫</button>
        <button class="theme-btn nature" id="themeNature" title="小清新自然">🌿</button>
    </div>

<!-- 背景音乐播放器组件 -->
<div id="musicPlayerContainer"></div>
<script src="/src/components/music-player/music-player.js"></script>

<div class="container">
    <div class="nav-bar">
        <a href="/index.html" class="logo-link"><div class="logo">✦ MATRIX ✦</div></a>
        <div class="nav-links">
            <a href="/index.html">⌾ 简历</a>
            <a href="/src/pages/blogs/blog-list.html" class="active">◉ 博客</a>
        </div>
    </div>

    <div class="cyber-card animate-fade-in" style="max-width: 900px; margin: 0 auto;">
        <!-- 博客标题 -->
        <h1 id="blogTitle" class="blog-title-detail"></h1>
        
        <!-- 博客元信息 -->
        <div class="blog-meta-detail" id="blogMeta"></div>
        
        <!-- 返回按钮 -->
        <a href="/src/pages/blogs/blog-list.html" class="back-link">← 返回博客列表</a>
        
        <hr>
        
        <!-- Markdown内容容器 -->
        <div class="markdown-content" id="markdownContent"></div>
        
        <hr>
        
        <!-- 相关文章 -->
        <h3>📁 相关文章</h3>
        <div class="related-posts" id="relatedPosts"></div>
    </div>
    
    <footer>✦ 赛博边界 · 参数化博客系统 | Powered by Markdown ✦</footer>
</div>

<script>
    // ========== 背景音乐播放器 ==========
    let audioPlayer = null;
    let currentTrackIndex = 0;
    let isPlaying = false;
    let progressInterval = null;
    let isDraggingProgress = false;
    let isDraggingPlayer = false;
    let dragOffset = { x: 0, y: 0 };

    function getMusicList() {
        if (typeof MUSIC_LIST !== 'undefined') {
            return MUSIC_LIST.map(item => ({
                ...item,
                path: '../assets/music/' + item.file
            }));
        }
        return [
            { title: 'Cyber Dreams', path: '../assets/music/cyber-dreams.mp3' },
            { title: 'Neon Night', path: '../assets/music/neon-night.mp3' },
            { title: 'Digital Sunset', path: '../assets/music/digital-sunset.mp3' }
        ];
    }

    const BACKGROUND_MUSIC = getMusicList();

    function initMusicPlayer() {
        const toggleBtn = document.getElementById('musicToggle');
        const nextBtn = document.getElementById('musicNext');
        const prevBtn = document.getElementById('musicPrev');
        const progressBar = document.getElementById('musicProgress');
        const dragHandle = document.getElementById('musicDragHandle');
        const player = document.getElementById('musicPlayer');
        
        audioPlayer = new Audio();
        audioPlayer.volume = 0.3;
        
        currentTrackIndex = Math.floor(Math.random() * BACKGROUND_MUSIC.length);
        loadTrack(currentTrackIndex);

        // 播放/暂停
        toggleBtn.addEventListener('click', togglePlay);
        
        // 上一首/下一首
        prevBtn.addEventListener('click', playPrev);
        nextBtn.addEventListener('click', playNext);
        
        // 进度条点击
        progressBar.addEventListener('click', seekTo);
        
        // 进度条拖拽
        const thumb = document.getElementById('musicProgressThumb');
        thumb.addEventListener('mousedown', startDragProgress);
        
        // 播放器拖拽
        dragHandle.addEventListener('mousedown', startDragPlayer);
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', stopDrag);
    }

    function loadTrack(index) {
        if (audioPlayer) {
            audioPlayer.src = BACKGROUND_MUSIC[index].path;
            document.getElementById('musicTitle').textContent = BACKGROUND_MUSIC[index].title;
            document.getElementById('musicArtist').textContent = 'CyberSound';
        }
    }

    function togglePlay() {
        if (!audioPlayer) return;
        
        if (isPlaying) {
            audioPlayer.pause();
            document.getElementById('musicToggle').innerHTML = '▶';
        } else {
            audioPlayer.play().catch(e => console.log('Auto-play blocked'));
            document.getElementById('musicToggle').innerHTML = '⏸';
        }
        isPlaying = !isPlaying;
    }

    function playNext() {
        currentTrackIndex = (currentTrackIndex + 1) % BACKGROUND_MUSIC.length;
        loadTrack(currentTrackIndex);
        if (isPlaying) audioPlayer.play();
    }

    function playPrev() {
        currentTrackIndex = (currentTrackIndex - 1 + BACKGROUND_MUSIC.length) % BACKGROUND_MUSIC.length;
        loadTrack(currentTrackIndex);
        if (isPlaying) audioPlayer.play();
    }

    function formatTime(seconds) {
        if (isNaN(seconds) || !isFinite(seconds)) return '00:00';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function updateProgress() {
        if (!audioPlayer || isDraggingProgress) return;
        
        const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
        document.getElementById('musicProgressBar').style.width = progress + '%';
        document.getElementById('musicProgressThumb').style.left = progress + '%';
        document.getElementById('musicTime').textContent = `${formatTime(audioPlayer.currentTime)} / ${formatTime(audioPlayer.duration)}`;
    }

    function seekTo(e) {
        if (!audioPlayer) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        audioPlayer.currentTime = percent * audioPlayer.duration;
    }

    function startDragProgress(e) {
        isDraggingProgress = true;
        e.preventDefault();
    }

    function startDragPlayer(e) {
        isDraggingPlayer = true;
        const player = document.getElementById('musicPlayer');
        dragOffset.x = e.clientX - player.offsetLeft;
        dragOffset.y = e.clientY - player.offsetTop;
        e.preventDefault();
    }

    function onMouseMove(e) {
        if (isDraggingProgress) {
            const progressBar = document.getElementById('musicProgress');
            const rect = progressBar.getBoundingClientRect();
            const percent = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
            document.getElementById('musicProgressBar').style.width = percent + '%';
            document.getElementById('musicProgressThumb').style.left = percent + '%';
            if (audioPlayer) {
                audioPlayer.currentTime = (percent / 100) * audioPlayer.duration;
            }
        }
        
        if (isDraggingPlayer) {
            const player = document.getElementById('musicPlayer');
            let newX = e.clientX - dragOffset.x;
            let newY = e.clientY - dragOffset.y;
            
            const maxX = window.innerWidth - player.offsetWidth - 10;
            const maxY = window.innerHeight - player.offsetHeight - 10;
            newX = Math.max(10, Math.min(maxX, newX));
            newY = Math.max(10, Math.min(maxY, newY));
            
            player.style.left = newX + 'px';
            player.style.top = newY + 'px';
        }
    }

    function stopDrag() {
        isDraggingProgress = false;
        isDraggingPlayer = false;
    }

    // ========== 主题切换 ==========
    function initThemeToggle() {
        const buttons = document.querySelectorAll('.theme-btn');
        let savedTheme = localStorage.getItem('theme') || 'cyber';
        
        // 确保主题名不带 theme- 前缀
        if (savedTheme.startsWith('theme-')) {
            savedTheme = savedTheme.replace('theme-', '');
        }
        
        // 设置 body 的主题类名
        document.body.className = 'theme-' + savedTheme;
        
        // 设置按钮激活状态
        buttons.forEach(btn => {
            btn.classList.remove('active');
            const btnTheme = btn.id.replace('theme', '').toLowerCase();
            if (btnTheme === savedTheme) {
                btn.classList.add('active');
            }
        });

        // 设置按钮点击事件
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                const theme = btn.id.replace('theme', '').toLowerCase();
                document.body.className = 'theme-' + theme;
                localStorage.setItem('theme', theme);  // 保存不带前缀的主题名
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
    }

    // ========== 矩阵雨动画 ==========
    function generateMatrixRain() {
        const matrixBg = document.getElementById('matrixBg');
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%^&*()+=<>?/|\\~`{}[];:,.+-_';
        const columns = Math.floor(window.innerWidth / 18);
        
        for (let i = 0; i < columns; i++) {
            if (Math.random() > 0.6) continue;
            
            const column = document.createElement('div');
            column.className = 'init-matrix-column';
            column.style.left = i * 18 + 'px';
            column.style.animationDuration = (Math.random() * 4 + 8) + 's';
            column.style.animationDelay = Math.random() * 8 + 's';
            
            let charsHTML = '';
            const charCount = Math.floor(Math.random() * 25 + 15);
            for (let j = 0; j < charCount; j++) {
                let brightnessClass = '';
                const brightnessRatio = j / charCount;
                if (brightnessRatio > 0.9) brightnessClass = 'bright';
                else if (brightnessRatio > 0.7) brightnessClass = 'medium';
                else if (brightnessRatio > 0.4) brightnessClass = 'dim';
                else brightnessClass = 'faint';
                
                if (Math.random() > 0.85) {
                    charsHTML += `<span class="init-matrix-char ${brightnessClass}" style="height: 8px;"></span>`;
                } else {
                    charsHTML += `<span class="init-matrix-char ${brightnessClass}">${chars[Math.floor(Math.random() * chars.length)]}</span>`;
                }
            }
            column.innerHTML = charsHTML;
            matrixBg.appendChild(column);
        }
    }

    function initAnimation() {
        generateMatrixRain();
        
        const overlay = document.getElementById('initOverlay');
        setTimeout(() => {
            overlay.style.display = 'none';
            document.querySelectorAll('.animate-fade-in').forEach(el => {
                el.style.opacity = '';
            });
        }, 3500);
    }

    // ========== Markdown 渲染 ==========
    async function loadMarkdownFile(filename) {
        try {
            const response = await fetch(filename);
            if (!response.ok) {
                throw new Error('File not found');
            }
            const markdownText = await response.text();
            return markdownText;
        } catch (error) {
            console.error('Error loading markdown:', error);
            return '# 文件加载失败\n\n无法找到或加载指定的 Markdown 文件。';
        }
    }

    async function renderMarkdown() {
        // 获取URL参数中的文件名
        const params = new URLSearchParams(window.location.search);
        const file = params.get('file');
        
        if (!file) {
            document.getElementById('markdownContent').innerHTML = '<p style="color: #ff007f;">错误：未指定博客文件</p>';
            return;
        }
        
        // 加载并渲染Markdown
        const markdownText = await loadMarkdownFile(file);
        
        // 使用marked解析Markdown
        const htmlContent = marked.parse(markdownText);
        document.getElementById('markdownContent').innerHTML = htmlContent;
        
        // 提取标题
        const titleMatch = markdownText.match(/^#\s+(.+)$/m);
        if (titleMatch) {
            document.getElementById('blogTitle').textContent = titleMatch[1];
        } else {
            document.getElementById('blogTitle').textContent = file.replace(/\.md$/, '');
        }
        
        // 设置元信息
        document.getElementById('blogMeta').textContent = `📅 ${new Date().toLocaleDateString('zh-CN')} | 📁 ${file}`;
        
        // 渲染相关文章
        renderRelatedPosts(file);
    }

    function renderRelatedPosts(currentFile) {
        const relatedPosts = [];
        
        // 根据当前文件的目录找出相关文章
        const allPosts = [
            { title: '深入理解 Java 虚拟机', file: '/src/assets/posts/backend/1_java-virtual-machine-deep-dive.md' },
            { title: 'Spring Boot 3.x 最佳实践', file: '/src/assets/posts/backend/2_spring-boot-3-best-practices.md' },
            { title: 'Go 并发编程', file: '/src/assets/posts/backend/3_go-concurrent-programming.md' },
            { title: 'Rust 内存安全', file: '/src/assets/posts/backend/4_rust-memory-safety.md' },
            { title: 'MySQL 性能优化', file: '/src/assets/posts/backend/5_mysql-optimization-guide.md' },
            { title: 'Redis 集群部署', file: '/src/assets/posts/backend/6_redis-cluster-deployment.md' },
            { title: 'Kafka 流式处理', file: '/src/assets/posts/backend/7_kafka-stream-processing.md' },
            { title: '微服务架构设计', file: '/src/assets/posts/backend/8_microservices-architecture.md' },
            { title: 'Nginx 高性能配置', file: '/src/assets/posts/backend/9_nginx-high-performance.md' },
            { title: '分布式事务解决方案', file: '/src/assets/posts/backend/10_distributed-transaction.md' },
            { title: 'React 18 新特性详解', file: '/src/assets/posts/frontend/1_react-18-new-features.md' },
            { title: 'TypeScript 5.0 装饰器', file: '/src/assets/posts/frontend/2_typescript-5-features.md' },
            { title: 'LangChain 与 RAG', file: '/src/assets/posts/ai/1_langchain-rag-knowledge-base.md' },
            { title: 'Prompt Engineering 进阶', file: '/src/assets/posts/ai/2_prompt-engineering-advanced.md' },
            { title: 'Kubernetes 核心原理', file: '/src/assets/posts/testdev/1_kubernetes-production-guide.md' },
            { title: 'GitHub Actions 进阶', file: '/src/assets/posts/testdev/2_github-actions-cicd.md' },
            { title: 'Python 爬虫进阶', file: '/src/assets/posts/automation/1_python-web-scraping.md' },
            { title: 'Python 自动化办公', file: '/src/assets/posts/automation/2_python-automation-office.md' }
        ];
        
        allPosts.forEach(post => {
            if (post.file !== currentFile) {
                relatedPosts.push(post);
            }
        });
        
        // 随机选择3篇相关文章
        const shuffled = relatedPosts.sort(() => 0.5 - Math.random());
        const selected = shuffled.slice(0, 3);
        
        const container = document.getElementById('relatedPosts');
        selected.forEach(post => {
            const link = document.createElement('a');
            link.href = `blog-detail.html?file=${encodeURIComponent(post.file)}`;
            link.className = 'related-item';
            link.innerHTML = `<strong>📄 ${post.title}</strong>`;
            container.appendChild(link);
        });
    }

    // ========== 页面加载完成后的初始化 ==========
    document.addEventListener('DOMContentLoaded', () => {
        // 初始化主题（从localStorage读取，保持页面间一致性）
        initThemeToggle();
        
        initMusicPlayer();
        renderMarkdown();
        
        // 音频事件监听
        if (audioPlayer) {
            audioPlayer.addEventListener('timeupdate', updateProgress);
            audioPlayer.addEventListener('ended', playNext);
        }
    });
</script>
</body>
</html>
