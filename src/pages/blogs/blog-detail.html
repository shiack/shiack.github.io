<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客详情 | shiack</title>
    <link rel="stylesheet" href="/src/assets/styles/cyber.css">
    <link rel="stylesheet" href="/src/assets/styles/effects.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.2.0/marked.min.js"></script>
    <script src="/src/js/modules/blog-data.js"></script>
    <script src="/src/js/modules/music-config.js"></script>
    <link rel="stylesheet" href="/src/components/music-player/music-player.css">
    <!-- Syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        .article-layout {
            display: grid;
            grid-template-columns: 1fr 260px;
            gap: 1.5rem;
            align-items: start;
        }
        @media (max-width: 900px) { .article-layout { grid-template-columns: 1fr; } }
        .article-main { min-width: 0; }
        .article-sidebar { position: sticky; top: 1.5rem; }
        .blog-title-detail {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: .5rem;
            line-height: 1.35;
        }
        .blog-meta-detail {
            color: var(--text-muted);
            font-size: .82rem;
            margin-bottom: 1rem;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: var(--primary-color);
            text-decoration: none;
            font-size: .85rem;
            transition: color .18s;
        }
        .back-link:hover { color: var(--secondary-color); }
        .markdown-content { line-height: 1.75; color: var(--text-color); }
        .markdown-content h1,.markdown-content h2 {
            color: var(--primary-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: .3rem;
            margin: 1.5rem 0 .75rem;
        }
        .markdown-content h3,.markdown-content h4 {
            color: var(--text-color);
            margin: 1.2rem 0 .5rem;
        }
        .markdown-content pre {
            background: rgba(0,0,0,.45);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 1rem;
            overflow-x: auto;
            margin: 1rem 0;
        }
        .markdown-content code:not(pre code) {
            background: rgba(0,255,204,.08);
            color: var(--primary-color);
            padding: .1em .4em;
            border-radius: 3px;
            font-size: .88em;
        }
        .markdown-content blockquote {
            border-left: 3px solid var(--primary-color);
            padding: .5rem 1rem;
            margin: 1rem 0;
            background: rgba(0,255,204,.04);
            color: var(--text-secondary);
        }
        .markdown-content table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        .markdown-content th, .markdown-content td {
            border: 1px solid var(--border-color);
            padding: .5rem .75rem;
            text-align: left;
        }
        .markdown-content th { background: rgba(0,255,204,.08); color: var(--primary-color); }
        .related-posts { display: flex; flex-direction: column; gap: .5rem; margin-top: .75rem; }
        .related-item {
            display: block;
            padding: .5rem .75rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: .85rem;
            transition: all .18s;
        }
        .related-item:hover { border-color: var(--primary-color); color: var(--primary-color); }
    </style>
</head>
<body class="theme-cyber">
    <canvas id="particles-canvas" class="particles-canvas"></canvas>
    <div id="musicPlayerContainer"></div>

    <div class="container">
        <div id="site-nav"></div>

        <div class="article-layout">
            <div class="article-main">
                <div class="cyber-card reveal neon-lift" style="animation-delay:.1s">
                    <a href="/src/pages/blogs/blog-list.html" class="back-link">← 返回博客列表 / Back to list</a>
                    <h1 id="blogTitle" class="blog-title-detail"></h1>
                    <div id="blogMeta" class="blog-meta-detail"></div>
                    <hr style="border-color:var(--border-color);margin:1rem 0">
                    <div class="markdown-content" id="markdownContent">
                        <div class="skeleton-card" style="height:400px"></div>
                    </div>
                    <hr style="border-color:var(--border-color);margin:1.5rem 0">
                    <h3 style="color:var(--primary-color);margin-bottom:.5rem">📁 相关文章 / Related</h3>
                    <div class="related-posts" id="relatedPosts"></div>
                </div>
            </div>

            <div class="article-sidebar">
                <div id="toc-container" class="cyber-card reveal" style="animation-delay:.25s; padding:.75rem 1rem; min-height:60px"></div>
            </div>
        </div>

        <footer class="reveal" style="animation-delay:.5s">✦ 赛博边界 · Markdown Viewer ✦</footer>
    </div>

    <script src="/src/components/music-player/music-player.js"></script>
    <script type="module">
        import { injectThemeToggle, initTheme }     from '/src/js/core/theme.js';
        import { mountNav }                         from '/src/js/core/nav.js';
        import { escapeHtml }                       from '/src/js/core/utils.js';
        import { initParticles, initScrollReveal,
                 initReadingProgress, initScanLine } from '/src/js/core/effects.js';
        import { fetchMarkdown, loadFromLocalStorage,
                 renderMarkdownText, enhanceContent,
                 extractTitle }                     from '/src/js/core/markdown-renderer.js';

        // ── Boot ──────────────────────────────────────────────────────────
        injectThemeToggle();
        initTheme();
        mountNav('blog');
        initParticles('particles-canvas');
        initScanLine();
        initReadingProgress('.markdown-content');

        const musicPlayer = new MusicPlayer();
        document.getElementById('musicPlayerContainer').innerHTML = musicPlayer.playerHTML;
        musicPlayer.init();

        // ── Render article ────────────────────────────────────────────────
        async function renderArticle() {
            const params  = new URLSearchParams(window.location.search);
            const file    = params.get('file');
            const localId = params.get('localId');
            let markdown  = null;
            let sourceLabel = '';

            if (localId) {
                const stored = loadFromLocalStorage(localId);
                if (!stored) {
                    document.getElementById('markdownContent').innerHTML =
                        '<p style="color:var(--secondary-color)">错误：CMS文章不存在或已过期</p>';
                    return;
                }
                markdown    = stored.markdown;
                sourceLabel = `📡 CMS生成 · ${stored.generatedAt || ''}`;
            } else if (file) {
                markdown    = await fetchMarkdown(file);
                sourceLabel = `📁 ${decodeURIComponent(file).split('/').pop()}`;
            }

            if (!markdown) {
                document.getElementById('markdownContent').innerHTML =
                    '<p style="color:var(--secondary-color)">⚠️ 文章加载失败，请检查文件路径。</p>';
                return;
            }

            // Render
            document.getElementById('markdownContent').innerHTML = renderMarkdownText(markdown);
            if (typeof hljs !== 'undefined') {
                document.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
            }
            enhanceContent(document.getElementById('markdownContent'));

            // Title & meta
            const title = extractTitle(markdown);
            document.getElementById('blogTitle').textContent = title || (file || localId || '').replace(/\.md$/, '');
            document.title = `${document.getElementById('blogTitle').textContent} | shiack`;

            const post  = typeof BLOG_POSTS !== 'undefined'
                ? BLOG_POSTS.find(p => file && file.includes(p.id))
                : null;
            const metaEl = document.getElementById('blogMeta');
            metaEl.innerHTML = post
                ? `🗓️ ${post.date} &nbsp;·&nbsp; 🏷️ ${post.tags.map(t => `<span class="mini-tag">#${escapeHtml(t)}</span>`).join(' ')}`
                : `📅 ${new Date().toLocaleDateString('zh-CN')} &nbsp;·&nbsp; ${sourceLabel}`;

            renderRelated(file || localId);
        }

        function renderRelated(currentRef) {
            const container = document.getElementById('relatedPosts');
            if (typeof BLOG_POSTS === 'undefined') return;
            const pool    = BLOG_POSTS
                .filter(p => !currentRef || !currentRef.includes(p.id))
                .sort(() => 0.5 - Math.random())
                .slice(0, 4);
            container.innerHTML = pool.map(p => {
                const url = `/src/pages/blogs/blog-detail.html?file=${encodeURIComponent('/src/assets/posts/' + p.id + '.md')}`;
                return `<a href="${url}" class="related-item">📄 ${escapeHtml(p.title)}</a>`;
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', async () => {
            initScrollReveal('.reveal');
            await renderArticle();
        });
    </script>
</body>
</html>
